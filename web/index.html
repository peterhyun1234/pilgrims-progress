<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0A0814">
  <title>Pilgrim's Progress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Galmuri11&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0A0814;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Galmuri11', 'Press Start 2P', monospace;
    }
    #game-container {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    #game-container canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #loading-overlay {
      position: fixed; inset: 0;
      background: #0A0814;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    #loading-overlay .cross { font-size: 32px; color: #d4a853; margin-bottom: 16px; }
    #loading-overlay .text {
      font-family: 'Galmuri11', monospace;
      font-size: 12px; color: #8c8070;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
    #loading-overlay .cross { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="cross">✝</div>
    <div class="text">Loading...</div>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
