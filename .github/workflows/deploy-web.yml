# =============================================================================
# Deploy Web (Vite + Phaser) → GitHub Pages + itch.io
# =============================================================================
# web/ 폴더의 Vite 프로젝트를 빌드하여 GitHub Pages와 itch.io에 자동 배포합니다.
#
# 필요한 GitHub Secrets:
#   - BUTLER_CREDENTIALS : itch.io API 키 (https://itch.io/user/settings/api-keys)
#   - ITCH_GAME          : itch.io 게임 경로 (예: "username/pilgrims-progress")
#
# GitHub Pages 설정:
#   Settings → Pages → Source: "GitHub Actions"
# =============================================================================

name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ===========================================================================
  # Build
  # ===========================================================================
  build:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build (GitHub Pages)
        run: pnpm build
        working-directory: web
        env:
          GITHUB_PAGES: 'true'

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Build (itch.io — root base path)
        run: pnpm build
        working-directory: web

      - name: Upload itch.io artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-web-itch
          path: web/dist
          retention-days: 3

  # ===========================================================================
  # Deploy to GitHub Pages
  # ===========================================================================
  deploy-pages:
    name: GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ===========================================================================
  # Deploy to itch.io
  # ===========================================================================
  deploy-itch:
    name: itch.io
    needs: build
    runs-on: ubuntu-latest
    if: vars.DEPLOY_ITCH == 'true'

    steps:
      - name: Download itch.io artifact
        uses: actions/download-artifact@v4
        with:
          name: build-web-itch
          path: dist

      - name: Install Butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: ./butler push dist ${{ secrets.ITCH_GAME }}:web
