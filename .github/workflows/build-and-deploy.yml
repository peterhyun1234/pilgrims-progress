  #       uses: actions/cache@v4
  #       with:
  #         path: pilgrims-progress-unity/Library
  #         key: library-test-${{ hashFiles('pilgrims-progress-unity/Assets/**', 'pilgrims-progress-unity/Packages/manifest.json', 'pilgrims-progress-unity/ProjectSettings/**') }}
  #         restore-keys: |
  #           library-test-
  #
  #     - name: EditMode 테스트 실행
  #       uses: game-ci/unity-test-runner@v4
  #       env:
  #         UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  #         UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  #         UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  #       with:
  #         projectPath: pilgrims-progress-unity
  #         testMode: EditMode
  #         unityVersion: 6000.3.10f1
  #         githubToken: ${{ secrets.GITHUB_TOKEN }}
  #
  #     - name: 테스트 결과 업로드
  #       uses: actions/upload-artifact@v4
  #       if: always()
  #       with:
  #         name: test-results
  #         path: artifacts
  #         retention-days: 3

  # ===========================================================================
  # 빌드 작업: Unity WebGL 빌드
  # ===========================================================================
  build-webgl:
    name: WebGL 빌드
    # [임시 비활성화] 테스트 의존성 제거 - 다시 활성화하려면 아래 주석 해제
    # needs: test
    runs-on: ubuntu-latest

    steps:
      - name: 디스크 공간 확보
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Library 폴더 캐시
        uses: actions/cache@v4
        with:
          path: pilgrims-progress-unity/Library
          key: library-webgl-${{ hashFiles('pilgrims-progress-unity/Assets/**', 'pilgrims-progress-unity/Packages/manifest.json', 'pilgrims-progress-unity/ProjectSettings/**') }}
          restore-keys: |
            library-webgl-

      - name: Unity WebGL 빌드
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: pilgrims-progress-unity
          targetPlatform: WebGL
          unityVersion: 6000.3.10f1

      - name: 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: build-webgl
          path: build/WebGL/WebGL
          retention-days: 3

  # ===========================================================================
  # 배포 작업: itch.io에 업로드
  # ===========================================================================
  deploy-itch:
    name: itch.io 배포
    needs: build-webgl
    runs-on: ubuntu-latest

    steps:
      # 빌드 아티팩트 다운로드
      - name: 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: build-webgl
          path: build/WebGL/WebGL

      # Butler 설치 (itch.io 배포 도구)
      - name: Butler 설치
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      # itch.io에 WebGL 빌드 업로드
      - name: itch.io에 배포
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          ./butler push build/WebGL/WebGL ${{ secrets.ITCH_GAME }}:webgl
