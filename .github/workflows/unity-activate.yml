# =============================================================================
# Unity License 활성화 도우미
# =============================================================================
# 이 워크플로우는 CI 빌드에 필요한 Unity 라이선스 파일(.ulf)을 얻기 위한
# 활성화 요청 파일(.alf)을 생성합니다.
#
# 사용 방법:
#   1. GitHub Actions 탭에서 이 워크플로우를 수동으로 실행하세요.
#   2. 완료되면 Artifacts에서 .alf 파일을 다운로드하세요.
#   3. https://license.unity3d.com/manual 에 접속하세요.
#   4. 다운로드한 .alf 파일을 업로드하세요.
#   5. Unity에서 .ulf 라이선스 파일을 발급해줍니다.
#   6. .ulf 파일의 내용을 복사하세요.
#   7. GitHub 저장소 → Settings → Secrets → Actions에서
#      UNITY_LICENSE 라는 이름으로 .ulf 내용을 시크릿으로 등록하세요.
# =============================================================================

name: Unity License 활성화 도우미

# 수동 실행만 가능 (GitHub Actions 탭에서 "Run workflow" 버튼 클릭)
on:
  workflow_dispatch:

jobs:
  request-activation-file:
    name: 라이선스 활성화 파일 요청
    runs-on: ubuntu-latest

    steps:
      # 1단계: Unity 활성화 파일(.alf) 생성
      # GameCI의 액션을 사용하여 Unity 라이선스 활성화에 필요한 .alf 파일을 만듭니다.
      - name: Unity 활성화 파일 요청
        id: get-alf
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.3.11f1

      # 2단계: .alf 파일을 아티팩트로 업로드
      # 워크플로우 완료 후 GitHub Actions 페이지에서 다운로드할 수 있습니다.
      - name: 활성화 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: ${{ steps.get-alf.outputs.filePath }}
          retention-days: 1
